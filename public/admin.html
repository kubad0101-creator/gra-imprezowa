<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Admina - Reżyserka</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e2e8f0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 15px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; width: 100%; margin-bottom: 10px;}
        .btn-tac { background: #f59e0b; }
        .btn-round { background: #10b981; }
        .btn-res { background: #3b82f6; }
        .btn-stop { background: #ef4444; }
    </style>
</head>
<body>
    <h1>⚙️ REŻYSERKA GRY</h1>
    <div class="card">
        <h2>Flow Rundy</h2>
        <button class="btn-tac" onclick="socket.emit('adminStartTactical')">1. Losuj RUNDĘ (Pokój Taktyczny)</button>
        <button class="btn-round" onclick="socket.emit('adminStartRound')">2. Pokaż PYTANIE na TV</button>
        <button class="btn-res" onclick="socket.emit('adminShowResults')">3. Odsłoń WYNIKI / Pokaż Rysunki i Zdjęcia</button>
        <hr style="margin: 20px 0;">
        <button class="btn-stop" onclick="socket.emit('adminBackToLobby')">Zakończ Fazę (Wróć do Lobby)</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>const socket = io();</script>
</body>
</html>
