<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Party Protocol - TV</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 40px; margin: 0;}
        h1 { color: #38bdf8; font-size: 3em; margin: 0; }
        .q-box { background: #334155; padding: 40px; border-radius: 15px; font-size: 2.5em; margin: 20px 0; border: 4px solid #475569; }
        .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 1.5em; }
        .opt-item { background: #1e293b; padding: 20px; border-radius: 10px; border: 2px solid #38bdf8; }
        .players-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px; }
        .player-card { background: #0f172a; border: 2px solid #64748b; padding: 15px; border-radius: 10px; width: 160px; }
        .score { font-size: 2em; color: #10b981; font-weight: bold; }
        
        /* Galeria obrazów i rysunków */
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .gallery-item { background: #1e293b; padding: 10px; border-radius: 10px; }
        .gallery-item img { max-width: 300px; max-height: 300px; border-radius: 5px; border: 2px solid white; background: white;}
        .gallery-name { font-size: 1.2em; margin-top: 10px; color: #38bdf8; }
    </style>
</head>
<body>

    <div id="lobby-view">
        <h1>PARTY PROTOCOL</h1>
        <h2>LOBBY - Czekamy na graczy</h2>
    </div>

    <div id="tactical-view" style="display:none;">
        <h1 style="color: #f59e0b;">POKÓJ TAKTYCZNY</h1>
        <h2>Kategoria: <span id="tac-cat" style="color:#38bdf8;"></span></h2>
    </div>

    <div id="round-view" style="display:none;">
        <h3 style="color: #94a3b8;" id="q-cat">Kategoria</h3>
        <div class="q-box" id="q-text">Pytanie</div>
        <div id="q-options" class="options-list"></div>
    </div>

    <div id="results-view" style="display:none;">
        <h1 style="color: #10b981;">WYNIKI RUNDY / GALERIA</h1>
        <div id="gallery-container" class="gallery"></div>
    </div>

    <hr style="margin: 40px 0; border-color: #334155;">
    <h2>TABELA WYNIKÓW</h2>
    <div id="players" class="players-grid"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('updateState', (state) => {
            const playersDiv = document.getElementById('players');
            playersDiv.innerHTML = '';
            for (let id in state.players) {
                const p = state.players[id];
                const activeIcon = p.boostActive ? '🔥' : '';
                const doneIcon = p.answered ? '✅' : '⏳';
                playersDiv.innerHTML += `
                    <div class="player-card">
                        <h3>${p.name} ${activeIcon}</h3>
                        <div class="score">${p.score}</div>
                        <div style="font-size: 1.5em; margin-top: 5px;">${doneIcon}</div>
                        ${state.phase === 'results' && p.answerData && !p.answerData.toString().startsWith('data:image') ? `<div style="color:#94a3b8; font-size:0.9em; margin-top:5px;">${p.answerData}</div>` : ''}
                    </div>`;
            }

            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('tactical-view').style.display = 'none';
            document.getElementById('round-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'none';

            if (state.phase === 'lobby') document.getElementById('lobby-view').style.display = 'block';
            else if (state.phase === 'tactical') {
                document.getElementById('tactical-view').style.display = 'block';
                document.getElementById('tac-cat').innerText = state.currentQuestion.category;
            } 
            else if (state.phase === 'round') {
                document.getElementById('round-view').style.display = 'block';
                document.getElementById('q-cat').innerText = state.currentQuestion.category;
                document.getElementById('q-text').innerText = state.currentQuestion.q;
                
                const optsDiv = document.getElementById('q-options');
                optsDiv.innerHTML = '';
                if(state.currentQuestion.type === 'abcd') {
                    state.currentQuestion.options.forEach(opt => {
                        optsDiv.innerHTML += `<div class="opt-item">${opt}</div>`;
                    });
                }
            }
            else if (state.phase === 'results') {
                document.getElementById('results-view').style.display = 'block';
                const gallery = document.getElementById('gallery-container');
                gallery.innerHTML = '';
                
                // Jeśli runda to zdjęcia lub rysowanie, zbuduj galerię na TV
                if (state.currentQuestion.type === 'photo' || state.currentQuestion.type === 'draw') {
                    state.submittedImages.forEach(imgData => {
                        gallery.innerHTML += `
                            <div class="gallery-item">
                                <img src="${imgData.img}" />
                                <div class="gallery-name">${imgData.name}</div>
                            </div>
                        `;
                    });
                }
            }
        });
    </script>
</body>
</html>
